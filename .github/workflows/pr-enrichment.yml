name: PR Enrichment

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  enrich-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find session references in commits
        id: sessions
        run: |
          # Extract session IDs from commit messages on this branch
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          SESSION_IDS=$(git log "${BASE}..${HEAD}" --pretty=%B | \
            grep -oP 'ai-team-sync-session: \K[a-f0-9-]+' | \
            sort -u | tr '\n' ',' | sed 's/,$//')

          echo "session_ids=${SESSION_IDS}" >> "$GITHUB_OUTPUT"
          echo "Found sessions: ${SESSION_IDS:-none}"

      - name: Fetch session details and enrich PR
        if: steps.sessions.outputs.session_ids != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATS_SERVER_URL: ${{ vars.ATS_SERVER_URL || 'http://localhost:8400' }}
        run: |
          IFS=',' read -ra IDS <<< "${{ steps.sessions.outputs.session_ids }}"

          ENRICHMENT="## AI Session Context\n\n"
          ENRICHMENT+="_Generated by [ai-team-sync](https://github.com/patrickv77/ai-team-sync)_\n\n"

          for SID in "${IDS[@]}"; do
            # Fetch session
            SESSION=$(curl -sf "${ATS_SERVER_URL}/api/sessions/${SID}" 2>/dev/null || echo "")
            if [ -z "$SESSION" ]; then
              ENRICHMENT+="### Session \`${SID:0:8}...\`\n_Details unavailable (server not reachable)_\n\n"
              continue
            fi

            DEV=$(echo "$SESSION" | jq -r '.developer')
            AGENT=$(echo "$SESSION" | jq -r '.agent')
            SCOPE=$(echo "$SESSION" | jq -r '.scope | join(", ")')
            SUMMARY=$(echo "$SESSION" | jq -r '.summary // "No summary"')

            ENRICHMENT+="### Session by ${DEV} (${AGENT})\n"
            ENRICHMENT+="- **Scope**: \`${SCOPE}\`\n"
            ENRICHMENT+="- **Summary**: ${SUMMARY}\n\n"

            # Fetch decisions for this session
            DECISIONS=$(curl -sf "${ATS_SERVER_URL}/api/decisions?session_id=${SID}" 2>/dev/null || echo "[]")
            DEC_COUNT=$(echo "$DECISIONS" | jq 'length')

            if [ "$DEC_COUNT" -gt 0 ]; then
              ENRICHMENT+="#### Decisions\n"
              echo "$DECISIONS" | jq -c '.[]' | while read -r dec; do
                TITLE=$(echo "$dec" | jq -r '.title')
                CHOSEN=$(echo "$dec" | jq -r '.chosen')
                REJECTED=$(echo "$dec" | jq -r '.rejected // "n/a"')
                REASON=$(echo "$dec" | jq -r '.reasoning')
                ENRICHMENT+="- **${TITLE}**: Chose ${CHOSEN}"
                if [ "$REJECTED" != "n/a" ]; then
                  ENRICHMENT+=" (over ${REJECTED})"
                fi
                ENRICHMENT+="\n"
                if [ -n "$REASON" ]; then
                  ENRICHMENT+="  > ${REASON}\n"
                fi
              done
              ENRICHMENT+="\n"
            fi
          done

          # Append to PR body
          CURRENT_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body')

          # Remove old enrichment if present
          CLEAN_BODY=$(echo "$CURRENT_BODY" | sed '/## AI Session Context/,$d')

          NEW_BODY="${CLEAN_BODY}

          $(echo -e "$ENRICHMENT")"

          gh pr edit ${{ github.event.pull_request.number }} --body "$NEW_BODY"
          echo "PR enriched with session context"
